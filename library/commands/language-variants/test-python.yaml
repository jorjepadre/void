id: language-variants/test-python
name: Test Suite (Python)
version: "1.0.0"
slash_command: /test-python
tags: [testing, python]
depends_on:
  skills: [languages/python/testing, testing/coverage]
  agents: [test-runner-python]
  commands: []

description: Run Python tests with pytest with fixtures and parametrize, report coverage, and surface flake risk.

parameters:
  - name: scope
    type: string
    required: false
    description: Test path, package, or blank for all
    default: ""
  - name: coverage_target
    type: number
    required: false
    description: Minimum coverage percentage
    default: 80

steps:
  - agent: testing/test-analyst
    action: "Run `pytest` scoped to {{scope}} (blank = full). Capture pass/fail counts and durations."
    await_result: true
    on_failure: abort
  - agent: testing/test-analyst
    action: "For failures, read the failing test and the code under test. Classify as: legitimate bug, test bug, or flake. Propose fixes."
    await_result: true
    on_failure: skip
  - agent: testing/test-analyst
    action: "Run `pytest --cov --cov-report=term-missing`. Report per-file coverage and flag files below {{coverage_target}}%."
    await_result: true
    on_failure: skip
  - agent: testing/test-analyst
    action: "Emit summary: passed, failed, flaky, coverage delta, and recommended next actions for Python."
    await_result: true
    on_failure: skip
