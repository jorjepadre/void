id: language-variants/tdd-java
name: TDD (Java)
version: "1.0.0"
slash_command: /tdd-java
tags: [testing, tdd, java]
depends_on:
  skills: [languages/java/patterns, languages/java/testing, tdd-workflow]
  agents: [tdd-guide-java]
  commands: []

description: Enforce red-green-refactor TDD for Java using JUnit 5 with AssertJ and Mockito.

parameters:
  - name: target
    type: string
    required: true
    description: Java function, method, or module to implement via TDD
  - name: coverage_target
    type: number
    required: false
    description: Minimum line coverage percentage
    default: 80

steps:
  - agent: testing/tdd-guide
    action: "RED. Scaffold signatures for {{target}} in Java with todo/panic/not-implemented stubs. Write tests using JUnit 5 with AssertJ and Mockito covering happy path, edges, and errors. Run `mvn test || ./gradlew test` and confirm failure for the expected reason."
    await_result: true
    on_failure: abort
  - agent: testing/tdd-guide
    action: "GREEN. Implement {{target}} in idiomatic Java (immutable fields, Optional over null, streams, proper equals/hashCode). Minimal code only. Re-run `mvn test || ./gradlew test` until all pass."
    await_result: true
    on_failure: retry
    max_retries: 3
  - agent: testing/tdd-guide
    action: "REFACTOR. Tighten naming and types on {{target}}. Re-run `mvn test || ./gradlew test` after each edit."
    await_result: true
    on_failure: abort
  - agent: testing/tdd-guide
    action: "COVERAGE. Run `mvn jacoco:report || ./gradlew jacocoTestReport` and confirm >= {{coverage_target}}% for {{target}}. Add tests for uncovered branches."
    await_result: true
    on_failure: retry
    max_retries: 2
