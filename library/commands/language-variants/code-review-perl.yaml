id: language-variants/code-review-perl
name: Code Review (Perl)
version: "1.0.0"
slash_command: /code-review-perl
tags: [review, quality, perl]
depends_on:
  skills: [languages/perl/patterns, code-quality/reviewer-perl, security/scanner]
  agents: [reviewer-perl]
  commands: []

description: Perl-specific code review covering idiomatic patterns, safety, and security.

parameters:
  - name: target
    type: string
    required: false
    description: Files, directory, or blank for changed files
    default: ""

steps:
  - agent: code-quality/reviewer-generic
    action: "Gather changed Perl files. If {{target}} is empty, use `git diff --name-only HEAD`. Otherwise use {{target}}. Read each file in full."
    await_result: true
    on_failure: abort
  - agent: code-quality/reviewer-generic
    action: "Run static analysis: `perlcritic -5`. Record findings with severity."
    await_result: true
    on_failure: skip
  - agent: code-quality/reviewer-generic
    action: "Manual review pass for Perl. Check idiomatic patterns (use strict, use warnings, lexical scope, explicit return, avoid symbol table hacks), error handling, concurrency safety, input validation, and injection risks. Tag findings CRITICAL/HIGH/MEDIUM/LOW with file:line."
    await_result: true
    on_failure: abort
  - agent: code-quality/reviewer-generic
    action: "Decide APPROVE / REQUEST_CHANGES / BLOCK. Block on any CRITICAL or HIGH finding. Emit the report."
    await_result: true
    on_failure: abort
