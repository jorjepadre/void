id: language-variants/code-review-python
name: Code Review (Python)
version: "1.0.0"
slash_command: /code-review-python
tags: [review, quality, python]
depends_on:
  skills: [languages/python/patterns, code-quality/reviewer-python, security/scanner]
  agents: [reviewer-python]
  commands: []

description: Python-specific code review covering idiomatic patterns, safety, and security.

parameters:
  - name: target
    type: string
    required: false
    description: Files, directory, or blank for changed files
    default: ""

steps:
  - agent: code-quality/reviewer-python
    action: "Gather changed Python files. If {{target}} is empty, use `git diff --name-only HEAD`. Otherwise use {{target}}. Read each file in full."
    await_result: true
    on_failure: abort
  - agent: code-quality/reviewer-python
    action: "Run static analysis: `ruff check . && mypy .`. Record findings with severity."
    await_result: true
    on_failure: skip
  - agent: code-quality/reviewer-python
    action: "Manual review pass for Python. Check idiomatic patterns (type hints, dataclasses, context managers, no bare except), error handling, concurrency safety, input validation, and injection risks. Tag findings CRITICAL/HIGH/MEDIUM/LOW with file:line."
    await_result: true
    on_failure: abort
  - agent: code-quality/reviewer-python
    action: "Decide APPROVE / REQUEST_CHANGES / BLOCK. Block on any CRITICAL or HIGH finding. Emit the report."
    await_result: true
    on_failure: abort
