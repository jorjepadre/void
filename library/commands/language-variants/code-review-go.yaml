id: language-variants/code-review-go
name: Code Review (Go)
version: "1.0.0"
slash_command: /code-review-go
tags: [review, quality, go]
depends_on:
  skills: [languages/go/patterns, code-quality/reviewer-go, security/scanner]
  agents: [reviewer-go]
  commands: []

description: Go-specific code review covering idiomatic patterns, safety, and security.

parameters:
  - name: target
    type: string
    required: false
    description: Files, directory, or blank for changed files
    default: ""

steps:
  - agent: code-quality/reviewer-go
    action: "Gather changed Go files. If {{target}} is empty, use `git diff --name-only HEAD`. Otherwise use {{target}}. Read each file in full."
    await_result: true
    on_failure: abort
  - agent: code-quality/reviewer-go
    action: "Run static analysis: `go vet ./... && staticcheck ./... && golangci-lint run`. Record findings with severity."
    await_result: true
    on_failure: skip
  - agent: code-quality/reviewer-go
    action: "Manual review pass for Go. Check idiomatic patterns (error wrapping with fmt.Errorf %w, context propagation, idiomatic names, no panic in libraries), error handling, concurrency safety, input validation, and injection risks. Tag findings CRITICAL/HIGH/MEDIUM/LOW with file:line."
    await_result: true
    on_failure: abort
  - agent: code-quality/reviewer-go
    action: "Decide APPROVE / REQUEST_CHANGES / BLOCK. Block on any CRITICAL or HIGH finding. Emit the report."
    await_result: true
    on_failure: abort
