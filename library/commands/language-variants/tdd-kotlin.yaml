id: language-variants/tdd-kotlin
name: TDD (Kotlin)
version: "1.0.0"
slash_command: /tdd-kotlin
tags: [testing, tdd, kotlin]
depends_on:
  skills: [languages/kotlin/patterns, languages/kotlin/testing, tdd-workflow]
  agents: [tdd-guide-kotlin]
  commands: []

description: Enforce red-green-refactor TDD for Kotlin using JUnit 5, Kotest, MockK.

parameters:
  - name: target
    type: string
    required: true
    description: Kotlin function, method, or module to implement via TDD
  - name: coverage_target
    type: number
    required: false
    description: Minimum line coverage percentage
    default: 80

steps:
  - agent: testing/tdd-guide
    action: "RED. Scaffold signatures for {{target}} in Kotlin with todo/panic/not-implemented stubs. Write tests using JUnit 5, Kotest, MockK covering happy path, edges, and errors. Run `./gradlew test` and confirm failure for the expected reason."
    await_result: true
    on_failure: abort
  - agent: testing/tdd-guide
    action: "GREEN. Implement {{target}} in idiomatic Kotlin (val over var, data classes, sealed classes, scope functions, no !! on nullable). Minimal code only. Re-run `./gradlew test` until all pass."
    await_result: true
    on_failure: retry
    max_retries: 3
  - agent: testing/tdd-guide
    action: "REFACTOR. Tighten naming and types on {{target}}. Re-run `./gradlew test` after each edit."
    await_result: true
    on_failure: abort
  - agent: testing/tdd-guide
    action: "COVERAGE. Run `./gradlew koverReport` and confirm >= {{coverage_target}}% for {{target}}. Add tests for uncovered branches."
    await_result: true
    on_failure: retry
    max_retries: 2
