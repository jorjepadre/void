id: language-variants/refactor-php
name: Refactor (PHP)
version: "1.0.0"
slash_command: /refactor-php
tags: [refactor, quality, php]
depends_on:
  skills: [languages/php/patterns, refactoring/safe-transforms]
  agents: [refactorer-php]
  commands: []

description: Safely refactor PHP code behind a passing test suite, favoring idiomatic patterns.

parameters:
  - name: target
    type: string
    required: true
    description: PHP module, file, or pattern to refactor
  - name: goal
    type: enum
    required: false
    description: Primary refactor goal
    default: clarity
    values: [clarity, performance, deduplication, dead-code, decoupling]

steps:
  - agent: refactoring/refactor-cleaner
    action: "Establish baseline: run `./vendor/bin/phpunit` and confirm green. If {{target}} coverage is insufficient for the {{goal}} refactor, add characterization tests first."
    await_result: true
    on_failure: abort
  - agent: refactoring/refactor-cleaner
    action: "Analyze {{target}} (PHP) for {{goal}} opportunities applying idiomatic patterns (strict_types=1, typed properties, PSR-12, readonly classes, no global state). Categorize as SAFE / CAUTION / DANGER."
    await_result: true
    on_failure: abort
  - agent: refactoring/refactor-cleaner
    action: "Apply SAFE refactors one at a time. Run `./vendor/bin/phpunit` after each; revert immediately on any failure."
    await_result: true
    on_failure: retry
    max_retries: 2
  - agent: refactoring/refactor-cleaner
    action: "Summarize refactors applied, skipped, and changes in test count, coverage, and complexity for {{target}}."
    await_result: true
    on_failure: skip
