id: language-variants/build-fix-csharp
name: Build Fix (C#)
version: "1.0.0"
slash_command: /build-fix-csharp
tags: [build, debugging, csharp]
depends_on:
  skills: [languages/csharp/patterns, build/resolver-csharp]
  agents: [build-resolver-csharp]
  commands: []

description: Incrementally fix C# build, compiler, and linter errors with minimal, surgical edits.

parameters:
  - name: max_attempts
    type: number
    required: false
    description: Maximum attempts on the same error
    default: 3

steps:
  - agent: build/resolver-generic
    action: "Run `dotnet build` and capture all diagnostics. Also run `dotnet format --verify-no-changes` for static analysis."
    await_result: true
    on_failure: abort
  - agent: build/resolver-generic
    action: "Parse output, group errors by file, and order by severity (compile errors before warnings). Report total count."
    await_result: true
    on_failure: abort
  - agent: build/resolver-generic
    action: "Fix one error at a time for typical C# issues (CS8618 non-nullable uninitialized, CS0246 type not found, async void, missing await). Apply minimal edits, re-run `dotnet build` after each, stop after {{max_attempts}} attempts on the same error."
    await_result: true
    on_failure: retry
    max_retries: 3
  - agent: build/resolver-generic
    action: "Emit summary: errors fixed, files modified, errors remaining, and suggested next steps."
    await_result: true
    on_failure: skip
