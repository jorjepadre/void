id: language-variants/refactor-cpp
name: Refactor (C++)
version: "1.0.0"
slash_command: /refactor-cpp
tags: [refactor, quality, cpp]
depends_on:
  skills: [languages/cpp/patterns, refactoring/safe-transforms]
  agents: [refactorer-cpp]
  commands: []

description: Safely refactor C++ code behind a passing test suite, favoring idiomatic patterns.

parameters:
  - name: target
    type: string
    required: true
    description: C++ module, file, or pattern to refactor
  - name: goal
    type: enum
    required: false
    description: Primary refactor goal
    default: clarity
    values: [clarity, performance, deduplication, dead-code, decoupling]

steps:
  - agent: refactoring/refactor-cleaner
    action: "Establish baseline: run `ctest --test-dir build` and confirm green. If {{target}} coverage is insufficient for the {{goal}} refactor, add characterization tests first."
    await_result: true
    on_failure: abort
  - agent: refactoring/refactor-cleaner
    action: "Analyze {{target}} (C++) for {{goal}} opportunities applying idiomatic patterns (RAII, smart pointers, const correctness, rule of zero, no raw new/delete). Categorize as SAFE / CAUTION / DANGER."
    await_result: true
    on_failure: abort
  - agent: refactoring/refactor-cleaner
    action: "Apply SAFE refactors one at a time. Run `ctest --test-dir build` after each; revert immediately on any failure."
    await_result: true
    on_failure: retry
    max_retries: 2
  - agent: refactoring/refactor-cleaner
    action: "Summarize refactors applied, skipped, and changes in test count, coverage, and complexity for {{target}}."
    await_result: true
    on_failure: skip
