id: language-variants/refactor-csharp
name: Refactor (C#)
version: "1.0.0"
slash_command: /refactor-csharp
tags: [refactor, quality, csharp]
depends_on:
  skills: [languages/csharp/patterns, refactoring/safe-transforms]
  agents: [refactorer-csharp]
  commands: []

description: Safely refactor C# code behind a passing test suite, favoring idiomatic patterns.

parameters:
  - name: target
    type: string
    required: true
    description: C# module, file, or pattern to refactor
  - name: goal
    type: enum
    required: false
    description: Primary refactor goal
    default: clarity
    values: [clarity, performance, deduplication, dead-code, decoupling]

steps:
  - agent: refactoring/refactor-cleaner
    action: "Establish baseline: run `dotnet test` and confirm green. If {{target}} coverage is insufficient for the {{goal}} refactor, add characterization tests first."
    await_result: true
    on_failure: abort
  - agent: refactoring/refactor-cleaner
    action: "Analyze {{target}} (C#) for {{goal}} opportunities applying idiomatic patterns (nullable reference types, records, async/await throughout, IDisposable via using). Categorize as SAFE / CAUTION / DANGER."
    await_result: true
    on_failure: abort
  - agent: refactoring/refactor-cleaner
    action: "Apply SAFE refactors one at a time. Run `dotnet test` after each; revert immediately on any failure."
    await_result: true
    on_failure: retry
    max_retries: 2
  - agent: refactoring/refactor-cleaner
    action: "Summarize refactors applied, skipped, and changes in test count, coverage, and complexity for {{target}}."
    await_result: true
    on_failure: skip
