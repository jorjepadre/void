id: language-variants/refactor-perl
name: Refactor (Perl)
version: "1.0.0"
slash_command: /refactor-perl
tags: [refactor, quality, perl]
depends_on:
  skills: [languages/perl/patterns, refactoring/safe-transforms]
  agents: [refactorer-perl]
  commands: []

description: Safely refactor Perl code behind a passing test suite, favoring idiomatic patterns.

parameters:
  - name: target
    type: string
    required: true
    description: Perl module, file, or pattern to refactor
  - name: goal
    type: enum
    required: false
    description: Primary refactor goal
    default: clarity
    values: [clarity, performance, deduplication, dead-code, decoupling]

steps:
  - agent: refactoring/refactor-cleaner
    action: "Establish baseline: run `prove -lr t/` and confirm green. If {{target}} coverage is insufficient for the {{goal}} refactor, add characterization tests first."
    await_result: true
    on_failure: abort
  - agent: refactoring/refactor-cleaner
    action: "Analyze {{target}} (Perl) for {{goal}} opportunities applying idiomatic patterns (use strict, use warnings, lexical scope, explicit return, avoid symbol table hacks). Categorize as SAFE / CAUTION / DANGER."
    await_result: true
    on_failure: abort
  - agent: refactoring/refactor-cleaner
    action: "Apply SAFE refactors one at a time. Run `prove -lr t/` after each; revert immediately on any failure."
    await_result: true
    on_failure: retry
    max_retries: 2
  - agent: refactoring/refactor-cleaner
    action: "Summarize refactors applied, skipped, and changes in test count, coverage, and complexity for {{target}}."
    await_result: true
    on_failure: skip
