id: language-variants/test-kotlin
name: Test Suite (Kotlin)
version: "1.0.0"
slash_command: /test-kotlin
tags: [testing, kotlin]
depends_on:
  skills: [languages/kotlin/testing, testing/coverage]
  agents: [test-runner-kotlin]
  commands: []

description: Run Kotlin tests with JUnit 5, Kotest, MockK, report coverage, and surface flake risk.

parameters:
  - name: scope
    type: string
    required: false
    description: Test path, package, or blank for all
    default: ""
  - name: coverage_target
    type: number
    required: false
    description: Minimum coverage percentage
    default: 80

steps:
  - agent: testing/test-analyst
    action: "Run `./gradlew test` scoped to {{scope}} (blank = full). Capture pass/fail counts and durations."
    await_result: true
    on_failure: abort
  - agent: testing/test-analyst
    action: "For failures, read the failing test and the code under test. Classify as: legitimate bug, test bug, or flake. Propose fixes."
    await_result: true
    on_failure: skip
  - agent: testing/test-analyst
    action: "Run `./gradlew koverReport`. Report per-file coverage and flag files below {{coverage_target}}%."
    await_result: true
    on_failure: skip
  - agent: testing/test-analyst
    action: "Emit summary: passed, failed, flaky, coverage delta, and recommended next actions for Kotlin."
    await_result: true
    on_failure: skip
