id: language-variants/build-fix-swift
name: Build Fix (Swift)
version: "1.0.0"
slash_command: /build-fix-swift
tags: [build, debugging, swift]
depends_on:
  skills: [languages/swift/patterns, build/resolver-swift]
  agents: [build-resolver-swift]
  commands: []

description: Incrementally fix Swift build, compiler, and linter errors with minimal, surgical edits.

parameters:
  - name: max_attempts
    type: number
    required: false
    description: Maximum attempts on the same error
    default: 3

steps:
  - agent: build/resolver-generic
    action: "Run `swift build` and capture all diagnostics. Also run `swiftlint lint --strict` for static analysis."
    await_result: true
    on_failure: abort
  - agent: build/resolver-generic
    action: "Parse output, group errors by file, and order by severity (compile errors before warnings). Report total count."
    await_result: true
    on_failure: abort
  - agent: build/resolver-generic
    action: "Fix one error at a time for typical Swift issues (optional unwrapping, protocol conformance, type inference, escaping closure capture). Apply minimal edits, re-run `swift build` after each, stop after {{max_attempts}} attempts on the same error."
    await_result: true
    on_failure: retry
    max_retries: 3
  - agent: build/resolver-generic
    action: "Emit summary: errors fixed, files modified, errors remaining, and suggested next steps."
    await_result: true
    on_failure: skip
