id: language-variants/refactor-go
name: Refactor (Go)
version: "1.0.0"
slash_command: /refactor-go
tags: [refactor, quality, go]
depends_on:
  skills: [languages/go/patterns, refactoring/safe-transforms]
  agents: [refactorer-go]
  commands: []

description: Safely refactor Go code behind a passing test suite, favoring idiomatic patterns.

parameters:
  - name: target
    type: string
    required: true
    description: Go module, file, or pattern to refactor
  - name: goal
    type: enum
    required: false
    description: Primary refactor goal
    default: clarity
    values: [clarity, performance, deduplication, dead-code, decoupling]

steps:
  - agent: refactoring/refactor-cleaner
    action: "Establish baseline: run `go test ./...` and confirm green. If {{target}} coverage is insufficient for the {{goal}} refactor, add characterization tests first."
    await_result: true
    on_failure: abort
  - agent: refactoring/refactor-cleaner
    action: "Analyze {{target}} (Go) for {{goal}} opportunities applying idiomatic patterns (error wrapping with fmt.Errorf %w, context propagation, idiomatic names, no panic in libraries). Categorize as SAFE / CAUTION / DANGER."
    await_result: true
    on_failure: abort
  - agent: refactoring/refactor-cleaner
    action: "Apply SAFE refactors one at a time. Run `go test ./...` after each; revert immediately on any failure."
    await_result: true
    on_failure: retry
    max_retries: 2
  - agent: refactoring/refactor-cleaner
    action: "Summarize refactors applied, skipped, and changes in test count, coverage, and complexity for {{target}}."
    await_result: true
    on_failure: skip
