id: language-variants/tdd-dart
name: TDD (Dart/Flutter)
version: "1.0.0"
slash_command: /tdd-dart
tags: [testing, tdd, dart]
depends_on:
  skills: [languages/dart/patterns, languages/dart/testing, tdd-workflow]
  agents: [tdd-guide-dart]
  commands: []

description: Enforce red-green-refactor TDD for Dart/Flutter using flutter_test with mocktail.

parameters:
  - name: target
    type: string
    required: true
    description: Dart/Flutter function, method, or module to implement via TDD
  - name: coverage_target
    type: number
    required: false
    description: Minimum line coverage percentage
    default: 80

steps:
  - agent: testing/tdd-guide
    action: "RED. Scaffold signatures for {{target}} in Dart/Flutter with todo/panic/not-implemented stubs. Write tests using flutter_test with mocktail covering happy path, edges, and errors. Run `flutter test` and confirm failure for the expected reason."
    await_result: true
    on_failure: abort
  - agent: testing/tdd-guide
    action: "GREEN. Implement {{target}} in idiomatic Dart/Flutter (null safety, const constructors, immutable state, single responsibility widgets). Minimal code only. Re-run `flutter test` until all pass."
    await_result: true
    on_failure: retry
    max_retries: 3
  - agent: testing/tdd-guide
    action: "REFACTOR. Tighten naming and types on {{target}}. Re-run `flutter test` after each edit."
    await_result: true
    on_failure: abort
  - agent: testing/tdd-guide
    action: "COVERAGE. Run `flutter test --coverage` and confirm >= {{coverage_target}}% for {{target}}. Add tests for uncovered branches."
    await_result: true
    on_failure: retry
    max_retries: 2
