id: language-variants/refactor-dart
name: Refactor (Dart/Flutter)
version: "1.0.0"
slash_command: /refactor-dart
tags: [refactor, quality, dart]
depends_on:
  skills: [languages/dart/patterns, refactoring/safe-transforms]
  agents: [refactorer-dart]
  commands: []

description: Safely refactor Dart/Flutter code behind a passing test suite, favoring idiomatic patterns.

parameters:
  - name: target
    type: string
    required: true
    description: Dart/Flutter module, file, or pattern to refactor
  - name: goal
    type: enum
    required: false
    description: Primary refactor goal
    default: clarity
    values: [clarity, performance, deduplication, dead-code, decoupling]

steps:
  - agent: refactoring/refactor-cleaner
    action: "Establish baseline: run `flutter test` and confirm green. If {{target}} coverage is insufficient for the {{goal}} refactor, add characterization tests first."
    await_result: true
    on_failure: abort
  - agent: refactoring/refactor-cleaner
    action: "Analyze {{target}} (Dart/Flutter) for {{goal}} opportunities applying idiomatic patterns (null safety, const constructors, immutable state, single responsibility widgets). Categorize as SAFE / CAUTION / DANGER."
    await_result: true
    on_failure: abort
  - agent: refactoring/refactor-cleaner
    action: "Apply SAFE refactors one at a time. Run `flutter test` after each; revert immediately on any failure."
    await_result: true
    on_failure: retry
    max_retries: 2
  - agent: refactoring/refactor-cleaner
    action: "Summarize refactors applied, skipped, and changes in test count, coverage, and complexity for {{target}}."
    await_result: true
    on_failure: skip
