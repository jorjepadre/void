id: language-variants/tdd-go
name: TDD (Go)
version: "1.0.0"
slash_command: /tdd-go
tags: [testing, tdd, go]
depends_on:
  skills: [languages/go/patterns, languages/go/testing, tdd-workflow]
  agents: [tdd-guide-go]
  commands: []

description: Enforce red-green-refactor TDD for Go using testing package with table-driven tests.

parameters:
  - name: target
    type: string
    required: true
    description: Go function, method, or module to implement via TDD
  - name: coverage_target
    type: number
    required: false
    description: Minimum line coverage percentage
    default: 80

steps:
  - agent: testing/tdd-guide
    action: "RED. Scaffold signatures for {{target}} in Go with todo/panic/not-implemented stubs. Write tests using testing package with table-driven tests covering happy path, edges, and errors. Run `go test ./...` and confirm failure for the expected reason."
    await_result: true
    on_failure: abort
  - agent: testing/tdd-guide
    action: "GREEN. Implement {{target}} in idiomatic Go (error wrapping with fmt.Errorf %w, context propagation, idiomatic names, no panic in libraries). Minimal code only. Re-run `go test ./...` until all pass."
    await_result: true
    on_failure: retry
    max_retries: 3
  - agent: testing/tdd-guide
    action: "REFACTOR. Tighten naming and types on {{target}}. Re-run `go test ./...` after each edit."
    await_result: true
    on_failure: abort
  - agent: testing/tdd-guide
    action: "COVERAGE. Run `go test -cover ./...` and confirm >= {{coverage_target}}% for {{target}}. Add tests for uncovered branches."
    await_result: true
    on_failure: retry
    max_retries: 2
