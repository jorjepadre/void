id: language-variants/test-php
name: Test Suite (PHP)
version: "1.0.0"
slash_command: /test-php
tags: [testing, php]
depends_on:
  skills: [languages/php/testing, testing/coverage]
  agents: [test-runner-php]
  commands: []

description: Run PHP tests with PHPUnit with Mockery, report coverage, and surface flake risk.

parameters:
  - name: scope
    type: string
    required: false
    description: Test path, package, or blank for all
    default: ""
  - name: coverage_target
    type: number
    required: false
    description: Minimum coverage percentage
    default: 80

steps:
  - agent: testing/test-analyst
    action: "Run `./vendor/bin/phpunit` scoped to {{scope}} (blank = full). Capture pass/fail counts and durations."
    await_result: true
    on_failure: abort
  - agent: testing/test-analyst
    action: "For failures, read the failing test and the code under test. Classify as: legitimate bug, test bug, or flake. Propose fixes."
    await_result: true
    on_failure: skip
  - agent: testing/test-analyst
    action: "Run `./vendor/bin/phpunit --coverage-text`. Report per-file coverage and flag files below {{coverage_target}}%."
    await_result: true
    on_failure: skip
  - agent: testing/test-analyst
    action: "Emit summary: passed, failed, flaky, coverage delta, and recommended next actions for PHP."
    await_result: true
    on_failure: skip
