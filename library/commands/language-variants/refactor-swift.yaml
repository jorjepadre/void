id: language-variants/refactor-swift
name: Refactor (Swift)
version: "1.0.0"
slash_command: /refactor-swift
tags: [refactor, quality, swift]
depends_on:
  skills: [languages/swift/patterns, refactoring/safe-transforms]
  agents: [refactorer-swift]
  commands: []

description: Safely refactor Swift code behind a passing test suite, favoring idiomatic patterns.

parameters:
  - name: target
    type: string
    required: true
    description: Swift module, file, or pattern to refactor
  - name: goal
    type: enum
    required: false
    description: Primary refactor goal
    default: clarity
    values: [clarity, performance, deduplication, dead-code, decoupling]

steps:
  - agent: refactoring/refactor-cleaner
    action: "Establish baseline: run `swift test` and confirm green. If {{target}} coverage is insufficient for the {{goal}} refactor, add characterization tests first."
    await_result: true
    on_failure: abort
  - agent: refactoring/refactor-cleaner
    action: "Analyze {{target}} (Swift) for {{goal}} opportunities applying idiomatic patterns (value types, guard let, Result, protocol-oriented, no force unwrap). Categorize as SAFE / CAUTION / DANGER."
    await_result: true
    on_failure: abort
  - agent: refactoring/refactor-cleaner
    action: "Apply SAFE refactors one at a time. Run `swift test` after each; revert immediately on any failure."
    await_result: true
    on_failure: retry
    max_retries: 2
  - agent: refactoring/refactor-cleaner
    action: "Summarize refactors applied, skipped, and changes in test count, coverage, and complexity for {{target}}."
    await_result: true
    on_failure: skip
