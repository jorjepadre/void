id: language-variants/test-rust
name: Test Suite (Rust)
version: "1.0.0"
slash_command: /test-rust
tags: [testing, rust]
depends_on:
  skills: [languages/rust/testing, testing/coverage]
  agents: [test-runner-rust]
  commands: []

description: Run Rust tests with #[test], rstest, proptest, mockall, report coverage, and surface flake risk.

parameters:
  - name: scope
    type: string
    required: false
    description: Test path, package, or blank for all
    default: ""
  - name: coverage_target
    type: number
    required: false
    description: Minimum coverage percentage
    default: 80

steps:
  - agent: testing/test-analyst
    action: "Run `cargo test` scoped to {{scope}} (blank = full). Capture pass/fail counts and durations."
    await_result: true
    on_failure: abort
  - agent: testing/test-analyst
    action: "For failures, read the failing test and the code under test. Classify as: legitimate bug, test bug, or flake. Propose fixes."
    await_result: true
    on_failure: skip
  - agent: testing/test-analyst
    action: "Run `cargo llvm-cov --html`. Report per-file coverage and flag files below {{coverage_target}}%."
    await_result: true
    on_failure: skip
  - agent: testing/test-analyst
    action: "Emit summary: passed, failed, flaky, coverage delta, and recommended next actions for Rust."
    await_result: true
    on_failure: skip
