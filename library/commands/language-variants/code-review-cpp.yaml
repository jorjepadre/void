id: language-variants/code-review-cpp
name: Code Review (C++)
version: "1.0.0"
slash_command: /code-review-cpp
tags: [review, quality, cpp]
depends_on:
  skills: [languages/cpp/patterns, code-quality/reviewer-cpp, security/scanner]
  agents: [reviewer-cpp]
  commands: []

description: C++-specific code review covering idiomatic patterns, safety, and security.

parameters:
  - name: target
    type: string
    required: false
    description: Files, directory, or blank for changed files
    default: ""

steps:
  - agent: code-quality/reviewer-cpp
    action: "Gather changed C++ files. If {{target}} is empty, use `git diff --name-only HEAD`. Otherwise use {{target}}. Read each file in full."
    await_result: true
    on_failure: abort
  - agent: code-quality/reviewer-cpp
    action: "Run static analysis: `clang-tidy && cppcheck`. Record findings with severity."
    await_result: true
    on_failure: skip
  - agent: code-quality/reviewer-cpp
    action: "Manual review pass for C++. Check idiomatic patterns (RAII, smart pointers, const correctness, rule of zero, no raw new/delete), error handling, concurrency safety, input validation, and injection risks. Tag findings CRITICAL/HIGH/MEDIUM/LOW with file:line."
    await_result: true
    on_failure: abort
  - agent: code-quality/reviewer-cpp
    action: "Decide APPROVE / REQUEST_CHANGES / BLOCK. Block on any CRITICAL or HIGH finding. Emit the report."
    await_result: true
    on_failure: abort
