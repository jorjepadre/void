id: language-variants/refactor-typescript
name: Refactor (TypeScript)
version: "1.0.0"
slash_command: /refactor-typescript
tags: [refactor, quality, typescript]
depends_on:
  skills: [languages/typescript/patterns, refactoring/safe-transforms]
  agents: [refactorer-typescript]
  commands: []

description: Safely refactor TypeScript code behind a passing test suite, favoring idiomatic patterns.

parameters:
  - name: target
    type: string
    required: true
    description: TypeScript module, file, or pattern to refactor
  - name: goal
    type: enum
    required: false
    description: Primary refactor goal
    default: clarity
    values: [clarity, performance, deduplication, dead-code, decoupling]

steps:
  - agent: refactoring/refactor-cleaner
    action: "Establish baseline: run `npm test` and confirm green. If {{target}} coverage is insufficient for the {{goal}} refactor, add characterization tests first."
    await_result: true
    on_failure: abort
  - agent: refactoring/refactor-cleaner
    action: "Analyze {{target}} (TypeScript) for {{goal}} opportunities applying idiomatic patterns (const, strict null checks, discriminated unions, no any). Categorize as SAFE / CAUTION / DANGER."
    await_result: true
    on_failure: abort
  - agent: refactoring/refactor-cleaner
    action: "Apply SAFE refactors one at a time. Run `npm test` after each; revert immediately on any failure."
    await_result: true
    on_failure: retry
    max_retries: 2
  - agent: refactoring/refactor-cleaner
    action: "Summarize refactors applied, skipped, and changes in test count, coverage, and complexity for {{target}}."
    await_result: true
    on_failure: skip
