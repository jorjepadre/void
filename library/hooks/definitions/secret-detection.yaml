id: secret-detection
event: PreToolUse
matcher:
  tool_name: "^(Edit|Write|Bash)$"
priority: 1000
timeout_ms: 5000
command: "void hook run secret-detection"
description: Blocks edits, writes, or shell commands that contain secrets (API keys, tokens, private keys, credentials).
profiles: [minimal, standard, strict]
enabled: true
