id: dev-server-block
event: PreToolUse
matcher:
  tool_name: "^Bash$"
  command: "(npm|yarn|pnpm) (run )?(dev|start|serve)$"
priority: 600
timeout_ms: 1000
command: "void hook run dev-server-block"
description: Blocks long-running dev-server commands that would hang the agent loop.
profiles: [strict]
enabled: true
