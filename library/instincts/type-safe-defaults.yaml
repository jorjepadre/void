id: builtin/type-safe-defaults
name: Type-Safe Defaults
description: Prefer strict typing patterns over permissive ones
version: "1.0.0"
trigger:
  type: pattern
  condition: "\\b(any|unknown|object)\\b|: *any"
  parameters:
    applies_to: typescript_source
confidence: 0.8
domain_tags: [typescript, types, safety]
action: "Replace `any` with a concrete type, generic parameter, or discriminated union. If the type is genuinely unknown, use `unknown` with a narrowing guard. Never introduce new `any` annotations without an explicit justification comment."
created_at: "2026-04-05T00:00:00Z"
usage_count: 0
