id: builtin/security-first
name: Security First
description: Apply security-conscious patterns by default when handling input, secrets, or external calls
version: "1.0.0"
trigger:
  type: pattern
  condition: "(password|token|secret|api[_-]?key|credential|authorization|eval\\(|exec\\(|child_process|shell=True|dangerouslySetInnerHTML)"
  parameters:
    applies_to: source_code
confidence: 0.9
domain_tags: [security, secrets, input-validation]
action: "Validate and sanitize external input, load secrets from environment or a secret store (never hardcode), prefer parameterized queries, avoid eval/exec on untrusted strings, and escape output at trust boundaries."
created_at: "2026-04-05T00:00:00Z"
usage_count: 0
