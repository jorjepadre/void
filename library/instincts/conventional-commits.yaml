id: builtin/conventional-commits
name: Conventional Commits
description: Enforce conventional commit message format
version: "1.0.0"
trigger:
  type: pattern
  condition: "^(feat|fix|docs|style|refactor|test|chore)(\\(.+\\))?: .+"
  parameters:
    applies_to: commit_message
confidence: 0.9
domain_tags: [git, commits, conventions]
action: "Rewrite commit message as <type>(<scope>): <description> where type is one of: feat, fix, docs, style, refactor, test, chore"
created_at: "2026-04-05T00:00:00Z"
usage_count: 0
