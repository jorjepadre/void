version: 1
providers:
  - type: anthropic
    displayName: "Anthropic Claude"
    apiKeyEnv: ANTHROPIC_API_KEY
    baseUrl: "https://api.anthropic.com"
    models:
      - id: claude-opus-4-5
        name: "Claude Opus 4.5"
        maxTokens: 200000
        costPer1kInput: 15.0
        costPer1kOutput: 75.0
        capabilities: [reasoning, code, vision, tool-use]
      - id: claude-sonnet-4-5
        name: "Claude Sonnet 4.5"
        maxTokens: 200000
        costPer1kInput: 3.0
        costPer1kOutput: 15.0
        capabilities: [reasoning, code, vision, tool-use]
      - id: claude-haiku-4-5
        name: "Claude Haiku 4.5"
        maxTokens: 200000
        costPer1kInput: 0.80
        costPer1kOutput: 4.0
        capabilities: [code, vision, tool-use]

  - type: openai
    displayName: "OpenAI"
    apiKeyEnv: OPENAI_API_KEY
    baseUrl: "https://api.openai.com/v1"
    models:
      - id: gpt-4o
        name: "GPT-4o"
        maxTokens: 128000
        costPer1kInput: 2.5
        costPer1kOutput: 10.0
        capabilities: [reasoning, code, vision, tool-use]
      - id: o1
        name: "o1"
        maxTokens: 200000
        costPer1kInput: 15.0
        costPer1kOutput: 60.0
        capabilities: [deep-reasoning, code]

  - type: google
    displayName: "Google Gemini"
    apiKeyEnv: GOOGLE_API_KEY
    models:
      - id: gemini-2.5-pro
        name: "Gemini 2.5 Pro"
        maxTokens: 2000000
        costPer1kInput: 1.25
        costPer1kOutput: 5.0
        capabilities: [reasoning, code, vision, long-context]
      - id: gemini-2.5-flash
        name: "Gemini 2.5 Flash"
        maxTokens: 1000000
        costPer1kInput: 0.075
        costPer1kOutput: 0.30
        capabilities: [code, vision]

  - type: ollama
    displayName: "Ollama (local)"
    apiKeyEnv: null
    baseUrl: "http://localhost:11434"
    models: []  # dynamically discovered

routing:
  - task_type: code-review
    preferred_provider: anthropic
    preferred_model: claude-sonnet-4-5
    fallback_provider: openai
    fallback_model: gpt-4o
  - task_type: deep-research
    preferred_provider: anthropic
    preferred_model: claude-opus-4-5
  - task_type: quick-fix
    preferred_provider: anthropic
    preferred_model: claude-haiku-4-5
  - task_type: long-context
    preferred_provider: google
    preferred_model: gemini-2.5-pro
  - task_type: reasoning
    preferred_provider: openai
    preferred_model: o1
